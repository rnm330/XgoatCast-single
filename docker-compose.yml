services:
  xgoatcast:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xgoatcast
    restart: unless-stopped
    init: true
    ports:
      - "${PORT:-3520}:3520"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3520/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
